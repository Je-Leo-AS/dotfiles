# =======================================
# Yazi Configuration
# ~/.config/yazi/yazi.toml
# =======================================

[mgr]
show_hidden = true
sort_by = "natural"
sort_dir_first = true
linemode = "size"

# =======================================
# Openers
# =======================================

[opener]
nvim-edit = [
  { run = 'nvim "$@"', block = true, for = "unix" }
]

pdf = [
  { run = 'xdg-open "$@"', desc = "Abrir PDF", orphan = true }
]

# =======================================
# Open Rules
# =======================================

[open]
rules = [
  { mime = "text/*", use = "nvim-edit" },
  { mime = "application/json", use = "nvim-edit" },
  { mime = "inode/x-empty", use = "nvim-edit" },

  { mime = "application/pdf", use = "pdf" },

  # Fallback para extensões comuns
  { url = "*.{txt,md,py,rs,js,ts,lua,conf,toml,yml,yaml,sh,zsh,bash,c,cpp,h,hpp,v,vhd,vhdl}", use = "nvim-edit" },
]

# =======================================
# Markdown Preview
# =======================================

[plugin]
prepend_previewers = [
  { url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -s dark --width "$w" "$1"' },
  { mime = "text/markdown", run = 'piper -- CLICOLOR_FORCE=1 glow -s dark --width "$w" "$1"' },
]

# =======================================
# Hidden Files Styling
# =======================================

[icon]
prepend_conds = [
  { if = "hidden & !dir", fg = "lightgray", italic = true },
  { if = "hidden & dir", fg = "darkgray", bold = true },
]
